services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: complaints
    ports:
      - "5432:5432"
    volumes:
      - complaints_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d complaints"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  complaints_pgdata:
